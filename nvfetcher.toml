# nvfetcher.toml - all sources managed declaratively
# Run: nvfetcher -o _sources

# mesa-git and dependencies (tracking git HEAD)
[mesa]
src.git = "https://gitlab.freedesktop.org/mesa/mesa.git"
fetch.git = "https://gitlab.freedesktop.org/mesa/mesa.git"

[libdrm]
src.git = "https://gitlab.freedesktop.org/mesa/drm.git"
fetch.git = "https://gitlab.freedesktop.org/mesa/drm.git"

# wayland - track latest release tag for wayland and wayland-scanner
[wayland]
src.cmd = "git ls-remote --tags --refs https://gitlab.freedesktop.org/wayland/wayland.git | awk -F/ '{print $NF}' | grep -E '^[0-9]+\\.[0-9]+\\.[0-9]+$' | awk -F. '$3 < 90' | sort -V | tail -1"
fetch.git = "https://gitlab.freedesktop.org/wayland/wayland.git"

[wayland-protocols]
src.git = "https://gitlab.freedesktop.org/wayland/wayland-protocols.git"
fetch.git = "https://gitlab.freedesktop.org/wayland/wayland-protocols.git"

# proton-cachyos (tracking github releases)
# $ver = "cachyos-10.0-20251222-slr", filename = "proton-$ver-x86_64.tar.xz"
[proton-cachyos]
src.github = "CachyOS/proton-cachyos"
fetch.url = "https://github.com/CachyOS/proton-cachyos/releases/download/$ver/proton-$ver-x86_64.tar.xz"

[proton-cachyos-x86_64-v3]
src.github = "CachyOS/proton-cachyos"
fetch.url = "https://github.com/CachyOS/proton-cachyos/releases/download/$ver/proton-$ver-x86_64_v3.tar.xz"

# Vintage Story
# tracks official modding api and using src.cmd to fetch the latest versions
# Looks like: "stable/vs_client_linux-x64_x.xx.x" or "unstable/vs_client_linux-x64_x.xx.x-rc.x"
[vintagestory]
src.cmd = '''
VER=$(curl -s https://mods.vintagestory.at/api/gameversions | jq -r '[.gameversions[].name | select(test("^[0-9]+[.][0-9]+[.][0-9]+(-rc[.][0-9]+)?$"))] | last')
if echo "$VER" | grep -q '\-rc\.'; then echo "unstable/vs_client_linux-x64_$VER"; else echo "stable/vs_client_linux-x64_$VER"; fi
'''
fetch.url = "https://cdn.vintagestory.at/gamefiles/$ver.tar.gz"

# PokeMMO
[pokemmo]
src.cmd = "curl -sIL https://pokemmo.com/download_file/1/ | grep -i '^content-length:' | tail -1 | awk '{print $2}' | tr -d '\\r'"
fetch.url = "https://pokemmo.com/download_file/1/"

# Pseudoregalia Randomizer
[pseudoregalia-rando]
src.github = "pseudoregalia-modding/rando"
fetch.url = "https://github.com/pseudoregalia-modding/rando/archive/$ver.tar.gz"

[oodle-lib]
src.manual = "0.2.3"
fetch.url = "https://github.com/new-world-tools/go-oodle/releases/download/v0.2.3-files/liboo2corelinux64.so.9"

# Eden Emulator - nightly
[eden-emulator]
src.git = "https://git.eden-emu.dev/eden-emu/eden.git"
fetch.git = "https://git.eden-emu.dev/eden-emu/eden.git"

# Hytale Launcher
[hytale-launcher]
src.cmd = "curl -s https://launcher.hytale.com/version/release/launcher.json | jq -r .version"
fetch.url = "https://launcher.hytale.com/builds/release/linux/amd64/hytale-launcher-$ver.zip"

# Discord Stable Client
[discord]
src.cmd = "curl -sI 'https://discord.com/api/download/stable?platform=linux&format=tar.gz' | grep -i location: | grep -o 'discord-[0-9.]*.tar.gz' | sed 's/discord-//;s/.tar.gz//'"
fetch.url = "https://dl.discordapp.net/apps/linux/$ver/discord-$ver.tar.gz"

# Vencord - nightly
[vencord]
src.git = "https://github.com/Vendicated/Vencord.git"
fetch.git = "https://github.com/Vendicated/Vencord.git"

# ModEngine 3 - latest release (Linux CLI + Windows DLLs)
[modengine3]
src.github = "garyttierney/me3"
fetch.url = "https://github.com/garyttierney/me3/releases/download/$ver/me3-linux-amd64.tar.gz"

# Fluxer - source build (uses sourceRoot for fluxer_desktop/)
[fluxer-desktop]
src.git = "https://github.com/fluxerapp/fluxer"
fetch.git = "https://github.com/fluxerapp/fluxer"

# Ship of Harkinian (Shipwright) - Ocarina of Time PC port
[shipwright]
src.github = "harbourmasters/shipwright"
fetch.git = "https://github.com/harbourmasters/shipwright.git"
git.fetchSubmodules = true

# 2 Ship 2 Harkinian - Majora's Mask PC port
[_2ship2harkinian]
src.github = "HarbourMasters/2ship2harkinian"
fetch.git = "https://github.com/HarbourMasters/2ship2harkinian.git"
git.fetchSubmodules = true

# OpenGoal Launcher - GUI for managing and launching OpenGoal games
[opengoal-launcher]
src.cmd = "curl -s https://api.github.com/repos/open-goal/launcher/releases/latest | jq -r '.tag_name | ltrimstr(\"v\")'"
fetch.url = "https://github.com/open-goal/launcher/releases/download/v$ver/OpenGOAL-Launcher_$ver_amd64.AppImage"
