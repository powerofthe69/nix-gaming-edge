name: Update and Build

on:
  schedule:
    - cron: "15 5 * * *" # Daily nightly update
  workflow_dispatch:

jobs:
  # Ensure sources are up-to-date
  update-sources:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.check.outputs.any_changed }}
      branch: ${{ steps.set-branch.outputs.branch }}
      version_changes: ${{ steps.check.outputs.version_changes }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Set branch
        id: set-branch
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "branch=nightly" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@main
        with:
          ref: ${{ steps.set-branch.outputs.branch }}

      - uses: cachix/install-nix-action@master
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Install dependencies
        run: nix profile add nixpkgs#nvfetcher nixpkgs#jq nixpkgs#cargo

      - name: Generate matrix from packages.json
        id: set-matrix
        run: echo "matrix=$(jq -c . packages.json)" >> $GITHUB_OUTPUT

      - name: Save old versions
        run: |
          cp _sources/generated.json /tmp/old-generated.json 2>/dev/null || echo '{}' > /tmp/old-generated.json

      - name: Update proton variants in nvfetcher, then run nvfetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          mkdir -p ~/.config/nvchecker
          printf '[keys]\ngithub = "%s"\ngitlab = "%s"\n' "$GITHUB_TOKEN" "$GITLAB_TOKEN" > ~/.config/nvchecker/keyfile.toml
          ./scripts/sync-proton-variants.sh
          nvfetcher -o _sources -k ~/.config/nvchecker/keyfile.toml
          ./scripts/sync-eden-deps.sh
          nvfetcher -c pkgs/eden-emulator/nvfetcher.toml -o pkgs/eden-emulator/_dependencies -k ~/.config/nvchecker/keyfile.toml

      - name: Check what changed
        id: check
        run: |
          # Track all version changes
          CHANGES=""
          for pkg in $(jq -r 'keys[]' _sources/generated.json); do
            OLD_VER=$(jq -r --arg pkg "$pkg" '.[$pkg].version // "none"' /tmp/old-generated.json)
            NEW_VER=$(jq -r --arg pkg "$pkg" '.[$pkg].version // "none"' _sources/generated.json)

            if [ "$OLD_VER" != "$NEW_VER" ]; then
              if [ -n "$CHANGES" ]; then
                CHANGES="${CHANGES}, "
              fi
              # Truncate version to first 7 chars if it looks like a git hash
              if [[ ${#NEW_VER} -gt 20 ]]; then
                CHANGES="${CHANGES}${pkg}: ${NEW_VER:0:7}"
              else
                CHANGES="${CHANGES}${pkg}: ${NEW_VER}"
              fi
            fi
          done

          # Use multiline output for GitHub Actions
          echo "version_changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if ! diff -q /tmp/old-generated.json _sources/generated.json > /dev/null 2>&1; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Cargo.lock for pseudoregalia
        run: |
          VER=$(jq -r '.["pseudoregalia-rando"].version' _sources/generated.json)
          CURRENT=""
          [ -f pkgs/pseudoregalia-rando/.version ] && CURRENT=$(cat pkgs/pseudoregalia-rando/.version)

          if [ "$CURRENT" != "$VER" ]; then
            WORK_DIR=$(mktemp -d)
            curl -sL "https://github.com/pseudoregalia-modding/rando/archive/$VER.tar.gz" | tar xz -C "$WORK_DIR"
            SRC_DIR=$(find "$WORK_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)
            (cd "$SRC_DIR" && cargo generate-lockfile)
            cp "$SRC_DIR/Cargo.lock" pkgs/pseudoregalia-rando/Cargo.lock
            echo "$VER" > pkgs/pseudoregalia-rando/.version
            rm -rf "$WORK_DIR"
          fi

      - name: Update pnpm hashes
        run: |
          for pkg in vencord fluxer-desktop; do
            case $pkg in
              vencord) HASH_FILE=pkgs/discord/vencord-pnpm-hash.txt ;;
              fluxer-desktop) HASH_FILE=pkgs/fluxer-desktop/pnpm-hash.txt ;;
            esac

            echo -n "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=" > "$HASH_FILE"
            nix build .#${pkg}.pnpmDeps --no-link 2> nix-err.log || true
            NEW_HASH=$(awk '/got:/ {print $2}' nix-err.log)

            if [[ $NEW_HASH == sha256-* ]]; then
              echo -n "$NEW_HASH" > "$HASH_FILE"
            else
              echo "Hash could not be scraped for $pkg:"
              cat nix-err.log
              exit 1
            fi
          done

      - name: Update flake.lock
        if: steps.check.outputs.any_changed == 'true'
        run: nix flake update

      - name: Upload updated sources
        uses: actions/upload-artifact@main
        with:
          name: updated-sources
          retention-days: 1
          path: |
            nvfetcher.toml
            _sources/
            pkgs/eden-emulator/_dependencies/
            pkgs/eden-emulator/nvfetcher.toml
            pkgs/pseudoregalia-rando/Cargo.lock
            pkgs/pseudoregalia-rando/.version
            pkgs/discord/vencord-pnpm-hash.txt
            pkgs/fluxer-desktop/pnpm-hash.txt
            flake.lock

  # Build packages from a matrix
  build:
    needs: [update-sources]
    env:
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }} gitlab.freedesktop.org=${{ secrets.GITLAB_TOKEN }}
    if: needs.update-sources.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.update-sources.outputs.matrix) }}

    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ needs.update-sources.outputs.branch }}

      - uses: actions/download-artifact@main
        with:
          name: updated-sources

      - name: Purge Nix (sometimes Nix persists in a way that prevents Cachix installation)
        if: contains(matrix.runner, 'self-hosted')
        run: |
          sudo rm -rf /nix
          sudo rm -rf ~/.nix-* /root/.nix-*
          sudo rm -rf /etc/nix
          sudo rm -rf /homeless-shelter
        continue-on-error: true

      - uses: cachix/install-nix-action@master
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = http://attic:8080/tokidoki
            extra-trusted-public-keys = tokidoki:MD4VWt3kK8Fmz3jkiGoNRJIW31/QAm7l1Dcgz2Xa4hk=

      - name: Build ${{ matrix.name }}
        run: |
          for pkg in ${{ matrix.packages }}; do
            echo "::group::Building $pkg"
            nix build .#$pkg -L -o "result-$pkg"
            echo "::endgroup::"
          done

      - name: Push to Attic
        if: contains(matrix.runner, 'self-hosted')
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix profile add nixpkgs#attic-client
          attic login local http://attic:8080 $ATTIC_TOKEN
          attic push tokidoki $(nix-store -qR ./result-*) --ignore-upstream-cache-filter

  # Commit to target branch only when all builds succeed
  commit-changes:
    needs: [update-sources, build]
    if: |
      always() &&
      needs.update-sources.outputs.any_changed == 'true' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ needs.update-sources.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@main
        with:
          name: updated-sources

      - name: Commit changes
        env:
          VERSION_CHANGES: ${{ needs.update-sources.outputs.version_changes }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          # Create commit message
          if [ -n "$VERSION_CHANGES" ]; then
            git commit -m "chore: update sources" -m "$VERSION_CHANGES" || echo "Nothing to commit"
          else
            git commit -m "chore: update sources" || echo "Nothing to commit"
          fi

          git push origin ${{ needs.update-sources.outputs.branch }}

      - name: Promote Master off-cycle if Nixpkgs updated
        if: needs.update-sources.outputs.branch == 'nightly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MASTER_REV=$(git show origin/master:flake.lock | jq -r '.nodes.nixpkgs.locked.rev')
          NIGHTLY_REV=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          if [ "$MASTER_REV" != "$NIGHTLY_REV" ]; then
            gh workflow run promote.yml
          fi
